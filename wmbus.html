<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMB8465 wM-Bus Empfänger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1c;
            --bg-secondary: #111827;
            --bg-card: #1a2234;
            --accent-cyan: #06b6d4;
            --accent-emerald: #10b981;
            --accent-amber: #f59e0b;
            --accent-rose: #f43f5e;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #334155;
            --glow-cyan: 0 0 20px rgba(6, 182, 212, 0.3);
            --glow-emerald: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at top left, rgba(6, 182, 212, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(16, 185, 129, 0.06) 0%, transparent 50%);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-emerald));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: var(--glow-cyan);
        }

        .logo h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-emerald));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo span {
            display: block;
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 300;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--bg-card);
            border-radius: 9999px;
            border: 1px solid var(--border-color);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: all 0.3s ease;
        }

        .status-indicator.connected {
            background: var(--accent-emerald);
            box-shadow: 0 0 10px var(--accent-emerald);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .control-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .control-card:hover {
            border-color: var(--accent-cyan);
            box-shadow: var(--glow-cyan);
        }

        .control-card h3 {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        .btn-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        button {
            font-family: 'Outfit', sans-serif;
            font-size: 0.9375rem;
            font-weight: 500;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-emerald));
            color: var(--bg-primary);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow-cyan);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--border-color);
        }

        .btn-danger {
            background: var(--accent-rose);
            color: white;
        }

        .btn-danger:hover {
            box-shadow: 0 0 20px rgba(244, 63, 94, 0.4);
        }

        select {
            font-family: 'Outfit', sans-serif;
            font-size: 0.9375rem;
            padding: 0.75rem 1rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            min-width: 150px;
        }

        select:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-cyan);
        }

        .stat-label {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .telegram-section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.5rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .section-header h2 {
            font-size: 1.125rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .telegram-list {
            max-height: 500px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
        }

        .telegram-item {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            transition: background 0.2s ease;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .telegram-item:hover {
            background: rgba(6, 182, 212, 0.05);
        }

        .telegram-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .telegram-time {
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .telegram-type {
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .type-data { background: rgba(16, 185, 129, 0.2); color: var(--accent-emerald); }
        .type-cmd { background: rgba(6, 182, 212, 0.2); color: var(--accent-cyan); }
        .type-error { background: rgba(244, 63, 94, 0.2); color: var(--accent-rose); }

        .telegram-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.5rem;
            margin-bottom: 0.75rem;
            font-size: 0.75rem;
        }

        .telegram-info-item {
            display: flex;
            gap: 0.5rem;
        }

        .telegram-info-label {
            color: var(--text-muted);
        }

        .telegram-info-value {
            color: var(--accent-amber);
        }

        .telegram-hex {
            background: var(--bg-primary);
            padding: 0.75rem;
            border-radius: 8px;
            word-break: break-all;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .telegram-hex .highlight {
            color: var(--accent-cyan);
        }

        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .log-section {
            margin-top: 2rem;
        }

        .log-output {
            background: var(--bg-primary);
            padding: 1rem;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .log-entry {
            padding: 0.125rem 0;
        }

        .log-entry.error { color: var(--accent-rose); }
        .log-entry.success { color: var(--accent-emerald); }
        .log-entry.info { color: var(--accent-cyan); }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">📡</div>
                <div>
                    <h1>AMB8465 Receiver</h1>
                    <span>Wireless M-Bus Telegram Monitor</span>
                </div>
            </div>
            <div class="status-badge">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="statusText">Nicht verbunden</span>
            </div>
        </header>

        <div class="controls">
            <div class="control-card">
                <h3>Verbindung</h3>
                <div class="btn-group">
                    <button class="btn-primary" id="connectBtn" onclick="connectSerial()">
                        <span>🔌</span> Verbinden
                    </button>
                    <button class="btn-danger" id="disconnectBtn" onclick="disconnectSerial()" disabled>
                        <span>⏏️</span> Trennen
                    </button>
                </div>
            </div>

            <div class="control-card">
                <h3>Link Mode</h3>
                <div class="btn-group">
                    <select id="linkModeSelect">
                        <option value="0x09">C2/T2-Other (C1+T1)</option>
                        <option value="0x08">T2-Other (T1)</option>
                        <option value="0x0e">C2-Other (C1)</option>
                        <option value="0x03">S2 (S1/S1-m)</option>
                    </select>
                    <button class="btn-secondary" onclick="setLinkMode()" id="setModeBtn" disabled>
                        Setzen
                    </button>
                </div>
            </div>

            <div class="control-card">
                <h3>Aktionen</h3>
                <div class="btn-group">
                    <button class="btn-secondary" onclick="getDeviceInfo()" id="infoBtn" disabled>
                        ℹ️ Info
                    </button>
                    <button class="btn-secondary" onclick="clearTelegrams()">
                        🗑️ Leeren
                    </button>
                    <button class="btn-secondary" onclick="exportTelegrams()">
                        💾 Export
                    </button>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="telegramCount">0</div>
                <div class="stat-label">Telegramme</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="bytesReceived">0</div>
                <div class="stat-label">Bytes empfangen</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="lastRssi">--</div>
                <div class="stat-label">Letzter RSSI (dBm)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="uptime">00:00</div>
                <div class="stat-label">Verbindungszeit</div>
            </div>
        </div>

        <div class="telegram-section">
            <div class="section-header">
                <h2>📨 Empfangene Telegramme</h2>
                <span id="telegramInfo" style="color: var(--text-muted); font-size: 0.875rem;"></span>
            </div>
            <div class="telegram-list" id="telegramList">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/>
                    </svg>
                    <p>Noch keine Telegramme empfangen</p>
                    <p style="font-size: 0.875rem; margin-top: 0.5rem;">Verbinde dich mit dem AMB8465 um zu starten</p>
                </div>
            </div>
        </div>

        <div class="telegram-section log-section">
            <div class="section-header">
                <h2>📋 Protokoll</h2>
                <button class="btn-secondary" onclick="clearLog()" style="padding: 0.5rem 1rem; font-size: 0.8125rem;">
                    Leeren
                </button>
            </div>
            <div class="log-output" id="logOutput"></div>
        </div>
    </div>

    <script>
        // AMB8465 Protokoll-Konstanten
        const AMBER_SERIAL_SOF = 0xFF;
        const CMD_DATA_IND = 0x03;
        const CMD_SET_MODE_REQ = 0x04;
        const CMD_GET_REQ = 0x0A;
        const CMD_SERIALNO_REQ = 0x0B;

        // Globale Variablen
        let port = null;
        let reader = null;
        let readableStreamClosed = null;
        let isConnected = false;
        let readBuffer = [];
        let telegramCount = 0;
        let bytesReceived = 0;
        let connectionStartTime = null;
        let uptimeInterval = null;
        let telegrams = [];

        // XOR Checksum berechnen (wie im C++ Code)
        function xorChecksum(data, offset, len) {
            let c = 0;
            for (let i = offset; i < offset + len; i++) {
                c ^= data[i];
            }
            return c;
        }

        // Hex-String formatieren
        function toHex(byte) {
            return byte.toString(16).padStart(2, '0').toUpperCase();
        }

        function bytesToHex(bytes) {
            return Array.from(bytes).map(b => toHex(b)).join(' ');
        }

        // Logging
        function log(message, type = 'info') {
            const logOutput = document.getElementById('logOutput');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString('de-DE');
            entry.textContent = `[${timestamp}] ${message}`;
            logOutput.appendChild(entry);
            logOutput.scrollTop = logOutput.scrollHeight;
        }

        function clearLog() {
            document.getElementById('logOutput').innerHTML = '';
        }

        // UI aktualisieren
        function updateUI() {
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');
            const setModeBtn = document.getElementById('setModeBtn');
            const infoBtn = document.getElementById('infoBtn');
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');

            connectBtn.disabled = isConnected;
            disconnectBtn.disabled = !isConnected;
            setModeBtn.disabled = !isConnected;
            infoBtn.disabled = !isConnected;

            if (isConnected) {
                statusIndicator.classList.add('connected');
                statusText.textContent = 'Verbunden';
            } else {
                statusIndicator.classList.remove('connected');
                statusText.textContent = 'Nicht verbunden';
            }

            document.getElementById('telegramCount').textContent = telegramCount;
            document.getElementById('bytesReceived').textContent = bytesReceived;
        }

        // Uptime aktualisieren
        function updateUptime() {
            if (!connectionStartTime) return;
            const elapsed = Math.floor((Date.now() - connectionStartTime) / 1000);
            const minutes = Math.floor(elapsed / 60).toString().padStart(2, '0');
            const seconds = (elapsed % 60).toString().padStart(2, '0');
            document.getElementById('uptime').textContent = `${minutes}:${seconds}`;
        }

        // Mit Serial Port verbinden
        async function connectSerial() {
            try {
                // Port anfordern
                port = await navigator.serial.requestPort();
                
                // Port öffnen mit 9600 Baud (Standard für AMB8465)
                await port.open({ 
                    baudRate: 9600,
                    dataBits: 8,
                    stopBits: 1,
                    parity: 'none',
                    flowControl: 'none'
                });

                isConnected = true;
                connectionStartTime = Date.now();
                uptimeInterval = setInterval(updateUptime, 1000);
                
                log('Verbindung hergestellt', 'success');
                updateUI();

                // Lesevorgang starten
                startReading();

            } catch (error) {
                log(`Verbindungsfehler: ${error.message}`, 'error');
                console.error(error);
            }
        }

        // Lesevorgang
        async function startReading() {
            while (port.readable && isConnected) {
                reader = port.readable.getReader();
                try {
                    while (true) {
                        const { value, done } = await reader.read();
                        if (done) {
                            break;
                        }
                        if (value) {
                            bytesReceived += value.length;
                            updateUI();
                            
                            // Daten zum Buffer hinzufügen
                            readBuffer.push(...value);
                            
                            // Frames verarbeiten
                            processBuffer();
                        }
                    }
                } catch (error) {
                    if (isConnected) {
                        log(`Lesefehler: ${error.message}`, 'error');
                    }
                } finally {
                    reader.releaseLock();
                }
            }
        }

        // RSSI berechnen (wie im C++ Code)
        function calculateRssi(rssiRaw) {
            return rssiRaw >= 128 ? (rssiRaw - 256) / 2 - 74 : rssiRaw / 2 - 74;
        }

        // Prüfen ob ein valides wM-Bus C-Feld
        function isValidWMBusCField(c) {
            // Gültige C-Felder: 0x44 (SND-NR), 0x46 (SND-IR), 0x48 (RSP-UD), etc.
            const validCFields = [0x44, 0x46, 0x48, 0x4A, 0x53, 0x55, 0x5B, 0x5D, 0x6E, 0x73, 0x78, 0x79, 0x7A, 0x7B, 0x7C, 0x7D, 0x7E, 0x7F, 0x80, 0x8A, 0x8B];
            return validCFields.includes(c);
        }

        // Buffer verarbeiten und Frames extrahieren
        function processBuffer() {
            while (readBuffer.length >= 3) {
                // Prüfen ob Kommando-Frame (beginnt mit 0xFF)
                if (readBuffer[0] === AMBER_SERIAL_SOF) {
                    const msgId = readBuffer[1];
                    const payloadLen = readBuffer[2];
                    const frameLength = 4 + payloadLen; // FF + CMD + LEN + PAYLOAD + CS

                    if (readBuffer.length < frameLength) {
                        // Noch nicht genug Daten
                        return;
                    }

                    // Checksum prüfen
                    const calculatedCs = xorChecksum(readBuffer, 0, frameLength - 1);
                    const receivedCs = readBuffer[frameLength - 1];

                    if (calculatedCs !== receivedCs) {
                        log(`Checksum-Fehler: erwartet ${toHex(calculatedCs)}, erhalten ${toHex(receivedCs)}`, 'error');
                        readBuffer.shift(); // Ein Byte entfernen und weiter versuchen
                        continue;
                    }

                    // Frame extrahieren
                    const frame = readBuffer.splice(0, frameLength);
                    handleFrame(msgId, frame, payloadLen);

                } else {
                    // Transparenter Telegram-Modus (ohne 0xFF Header)
                    // Das erste Byte ist die Länge des wM-Bus Telegramms
                    const telegramLen = readBuffer[0];

                    // Prüfen ob plausibel (min. 10 Bytes für wM-Bus)
                    if (telegramLen < 10 || telegramLen > 255) {
                        log(`Ungültige Telegrammlänge: ${telegramLen}, überspringe Byte`, 'error');
                        readBuffer.shift();
                        continue;
                    }

                    // Prüfen ob C-Feld valide (zweites Byte)
                    if (readBuffer.length >= 2 && !isValidWMBusCField(readBuffer[1])) {
                        readBuffer.shift();
                        continue;
                    }

                    // +1 für RSSI am Ende
                    const frameLength = telegramLen + 1 + 1; // LEN + PAYLOAD + RSSI

                    if (readBuffer.length < frameLength) {
                        return; // Noch nicht genug Daten
                    }

                    const frame = readBuffer.splice(0, frameLength);
                    handleTelegram(frame);
                }
            }
        }

        // Frame verarbeiten
        function handleFrame(msgId, frame, payloadLen) {
            switch (msgId) {
                case CMD_DATA_IND:
                    // Daten-Indikation (Telegramm empfangen)
                    handleTelegram(frame.slice(3, 3 + payloadLen));
                    break;

                case (CMD_SET_MODE_REQ | 0x80):
                    log('Link-Mode erfolgreich gesetzt', 'success');
                    break;

                case (CMD_GET_REQ | 0x80):
                    log('Konfiguration empfangen', 'success');
                    parseConfig(frame);
                    break;

                case (CMD_SERIALNO_REQ | 0x80):
                    log('Seriennummer empfangen', 'success');
                    parseSerialNo(frame);
                    break;

                default:
                    log(`Unbekannte Antwort: ${toHex(msgId)}`, 'info');
            }
        }

        // wM-Bus Telegramm verarbeiten
        function handleTelegram(frame) {
            if (frame.length < 10) return;

            telegramCount++;
            
            // RSSI extrahieren (letztes Byte)
            const rssiRaw = frame[frame.length - 1];
            const rssiDbm = calculateRssi(rssiRaw);
            document.getElementById('lastRssi').textContent = rssiDbm;

            // Telegramm-Daten extrahieren
            const length = frame[0];
            const cField = frame[1];
            const mField = (frame[3] << 8) | frame[2];
            const aField = frame.slice(4, 10);
            const idField = aField.slice(0, 4);
            const version = aField[4];
            const deviceType = aField[5];

            // Hersteller-Code dekodieren
            const mfctCode = String.fromCharCode(
                ((mField >> 10) & 0x1F) + 64,
                ((mField >> 5) & 0x1F) + 64,
                (mField & 0x1F) + 64
            );

            // Meter-ID formatieren
            const meterId = idField.map(b => toHex(b)).reverse().join('');

            const telegram = {
                timestamp: new Date(),
                frame: frame,
                rssi: rssiDbm,
                length: length,
                cField: cField,
                manufacturer: mfctCode,
                meterId: meterId,
                version: version,
                deviceType: deviceType
            };

            telegrams.unshift(telegram);
            displayTelegram(telegram);
            updateUI();

            log(`Telegramm empfangen: ${mfctCode} ${meterId}, RSSI: ${rssiDbm} dBm`);
        }

        // Telegramm anzeigen
        function displayTelegram(telegram) {
            const list = document.getElementById('telegramList');
            
            // Leerzustand entfernen falls vorhanden
            const emptyState = list.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const item = document.createElement('div');
            item.className = 'telegram-item';

            const time = telegram.timestamp.toLocaleTimeString('de-DE', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                fractionalSecondDigits: 3 
            });

            const deviceTypes = {
                0x00: 'Other',
                0x01: 'Oil',
                0x02: 'Electricity',
                0x03: 'Gas',
                0x04: 'Heat',
                0x05: 'Steam',
                0x06: 'Warm Water',
                0x07: 'Water',
                0x08: 'Heat Cost Allocator',
                0x09: 'Compressed Air',
                0x0A: 'Cooling Load Volume',
                0x0B: 'Cooling Load Outlet',
                0x0C: 'Heat Volume',
                0x0D: 'Heat/Cooling Load',
                0x0E: 'Bus/System',
                0x0F: 'Unknown',
                0x15: 'Hot Water',
                0x16: 'Cold Water',
                0x17: 'Dual Water',
                0x18: 'Pressure',
                0x19: 'A/D Converter',
                0x1A: 'Smoke Detector',
                0x1B: 'Room Sensor',
                0x1C: 'Gas Detector',
                0x20: 'Breaker',
                0x21: 'Valve',
                0x28: 'Waste Water',
                0x29: 'Garbage',
                0x2A: 'Reserved',
                0x31: 'Communication Controller',
                0x32: 'Unidirectional Repeater',
                0x33: 'Bidirectional Repeater',
                0x37: 'Radio Converter'
            };

            const typeLabel = deviceTypes[telegram.deviceType] || `Unknown (${toHex(telegram.deviceType)})`;

            item.innerHTML = `
                <div class="telegram-header">
                    <span class="telegram-time">${time}</span>
                    <span class="telegram-type type-data">wM-Bus</span>
                </div>
                <div class="telegram-info">
                    <div class="telegram-info-item">
                        <span class="telegram-info-label">Hersteller:</span>
                        <span class="telegram-info-value">${telegram.manufacturer}</span>
                    </div>
                    <div class="telegram-info-item">
                        <span class="telegram-info-label">Meter-ID:</span>
                        <span class="telegram-info-value">${telegram.meterId}</span>
                    </div>
                    <div class="telegram-info-item">
                        <span class="telegram-info-label">Typ:</span>
                        <span class="telegram-info-value">${typeLabel}</span>
                    </div>
                    <div class="telegram-info-item">
                        <span class="telegram-info-label">Version:</span>
                        <span class="telegram-info-value">${toHex(telegram.version)}</span>
                    </div>
                    <div class="telegram-info-item">
                        <span class="telegram-info-label">C-Feld:</span>
                        <span class="telegram-info-value">${toHex(telegram.cField)}</span>
                    </div>
                    <div class="telegram-info-item">
                        <span class="telegram-info-label">RSSI:</span>
                        <span class="telegram-info-value">${telegram.rssi} dBm</span>
                    </div>
                </div>
                <div class="telegram-hex">${formatHexDisplay(telegram.frame)}</div>
            `;

            list.insertBefore(item, list.firstChild);

            // Nur die letzten 100 Telegramme behalten
            while (list.children.length > 100) {
                list.removeChild(list.lastChild);
            }
        }

        // Hex-Anzeige formatieren mit Highlighting
        function formatHexDisplay(frame) {
            let html = '';
            for (let i = 0; i < frame.length; i++) {
                const hex = toHex(frame[i]);
                if (i === 0) {
                    // Längenfeld
                    html += `<span class="highlight">${hex}</span> `;
                } else if (i === 1) {
                    // C-Feld
                    html += `<span class="highlight">${hex}</span> `;
                } else if (i >= 2 && i <= 3) {
                    // M-Feld
                    html += `<span style="color: var(--accent-emerald)">${hex}</span> `;
                } else if (i >= 4 && i <= 9) {
                    // A-Feld (ID + Version + Type)
                    html += `<span style="color: var(--accent-amber)">${hex}</span> `;
                } else {
                    html += `${hex} `;
                }
            }
            return html.trim();
        }

        // Kommando senden
        async function sendCommand(cmd, payload = []) {
            if (!port || !port.writable) {
                log('Port nicht beschreibbar', 'error');
                return;
            }

            const data = new Uint8Array([
                AMBER_SERIAL_SOF,
                cmd,
                payload.length,
                ...payload
            ]);

            // Checksum hinzufügen
            const withChecksum = new Uint8Array([...data, xorChecksum([...data], 0, data.length)]);

            const writer = port.writable.getWriter();
            try {
                await writer.write(withChecksum);
                log(`Kommando gesendet: ${bytesToHex(withChecksum)}`, 'info');
            } finally {
                writer.releaseLock();
            }
        }

        // Link-Mode setzen
        async function setLinkMode() {
            const select = document.getElementById('linkModeSelect');
            const mode = parseInt(select.value);
            
            await sendCommand(CMD_SET_MODE_REQ, [mode]);
            log(`Setze Link-Mode auf ${toHex(mode)}`, 'info');
        }

        // Geräteinfo abrufen
        async function getDeviceInfo() {
            // Seriennummer abrufen
            await sendCommand(CMD_SERIALNO_REQ);
            
            // Konfiguration abrufen
            setTimeout(async () => {
                await sendCommand(CMD_GET_REQ, [0x00, 0x80]);
            }, 200);
        }

        // Konfiguration parsen
        function parseConfig(frame) {
            if (frame.length >= 0x7e) {
                const id = (frame[55] << 24) | (frame[54] << 16) | (frame[53] << 8) | frame[52];
                log(`Device ID: ${id.toString(16).padStart(8, '0').toUpperCase()}`, 'success');
            }
        }

        // Seriennummer parsen
        function parseSerialNo(frame) {
            if (frame.length >= 8) {
                const serial = frame.slice(3, 7).map(b => toHex(b)).join('');
                log(`Seriennummer: ${serial}`, 'success');
            }
        }

        // Verbindung trennen
        async function disconnectSerial() {
            isConnected = false;

            if (reader) {
                await reader.cancel();
            }

            if (port) {
                await port.close();
                port = null;
            }

            if (uptimeInterval) {
                clearInterval(uptimeInterval);
            }

            readBuffer = [];
            log('Verbindung getrennt', 'info');
            updateUI();
        }

        // Telegramme leeren
        function clearTelegrams() {
            telegrams = [];
            telegramCount = 0;
            document.getElementById('telegramList').innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/>
                    </svg>
                    <p>Telegramme geleert</p>
                </div>
            `;
            updateUI();
        }

        // Telegramme exportieren
        function exportTelegrams() {
            if (telegrams.length === 0) {
                log('Keine Telegramme zum Exportieren', 'error');
                return;
            }

            const exportData = telegrams.map(t => ({
                timestamp: t.timestamp.toISOString(),
                manufacturer: t.manufacturer,
                meterId: t.meterId,
                deviceType: t.deviceType,
                version: t.version,
                rssi: t.rssi,
                hex: bytesToHex(t.frame)
            }));

            const json = JSON.stringify(exportData, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `wmbus-telegrams-${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.json`;
            a.click();
            
            URL.revokeObjectURL(url);
            log(`${telegrams.length} Telegramme exportiert`, 'success');
        }

        // Initialisierung
        document.addEventListener('DOMContentLoaded', () => {
            updateUI();
            
            // Prüfen ob Web Serial API verfügbar ist
            if (!('serial' in navigator)) {
                log('Web Serial API wird von diesem Browser nicht unterstützt. Bitte Chrome oder Edge verwenden.', 'error');
                document.getElementById('connectBtn').disabled = true;
            } else {
                log('Web Serial API verfügbar. Bereit zum Verbinden.', 'success');
            }
        });

        // Cleanup bei Seitenwechsel
        window.addEventListener('beforeunload', async () => {
            if (isConnected) {
                await disconnectSerial();
            }
        });
    </script>
</body>
</html>
